<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="./assets/styles/reset.css" />
    <link rel="stylesheet" href="./assets/styles/style.css" />
    <title>Document</title>
  </head>

  <body>
    <header class="cabecalho">
      <a
        class="cabecalho__logo"
        href="index.html"
        title="Voltar para a página inicial"
        ><img
          class="img-mobile"
          src="./assets/img/Logo-branca.png"
          alt="Logo bussola jornada-viagens cor preta"
        />
        <img
          class="img-desktop"
          src="./assets/img/logo+texto branca.png"
          alt="logo bussola com texto jornada cor branca"
        />
      </a>
      <div class="cabecalho__navegacao">
        <label for="menu"
          ><img
            class="cabecalho__navegacao-menu"
            src="./assets/img/menu.png"
            alt="menu"
          />
        </label>
        <input type="checkbox" name="" id="menu" hidden />
        <nav>
          <ul class="cabecalho__lista">
            <li class="cabecalho__navegacao-itens">
              <a href="blog.html" target="_blank" title="Acessar o blog"
                >Blog</a
              >
            </li>
            <li class="cabecalho__navegacao-itens">
              <a
                href="pacotes.html"
                target="_blank"
                title="Acessar os pacotes de viagem"
                >Pacote de viagem</a
              >
            </li>
            <li class="cabecalho__navegacao-itens">
              <a
                href="contato.html"
                target="_blank"
                title="Acessar informações de contato"
                >Contato</a
              >
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <section class="hero">
      <div class="hero-img"></div>
      <h2 class="hero-text">
        Somos uma agência apaixonada por criar viagens inesquecíveis. Do destino
        à seleção das atividades, cuidamos de todos os detalhes para que você
        aproveite ao máximo cada momento da sua jornada!
      </h2>
    </section>
  </body>
</html>
